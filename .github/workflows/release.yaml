name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROJECT_PATH: ThreeDAiStudioMcp.csproj
  APP_NAME: ThreeDAiStudioMcp
  WINX64_OUTPUT: ./publish/win-x64

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64
          - osx-arm64
          - linux-x64
          - linux-arm64
          - linux-musl-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish executable
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output ./publish/${{ matrix.rid }}

      - name: Package release asset
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            zip -r "../../${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.rid }}.zip" .
          else
            tar -czf "../../${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.rid }}.tar.gz" .
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: |
            ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.rid }}.zip
            ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz
          if-no-files-found: ignore

  build-installer:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download win-x64 publish artifact
        uses: actions/download-artifact@v4
        with:
          name: win-x64
          path: ${{ env.WINX64_OUTPUT }}

      - name: Install WiX v4
        shell: powershell
        run: dotnet tool install -g wix --version 4.0.2

      - name: Add WiX to PATH
        shell: powershell
        run: |
          $wixPath = (Get-ChildItem -Path "$env:LOCALAPPDATA\.dotnet\tools" -Filter "wix.exe" -Recurse | Select-Object -First 1).DirectoryName
          Add-Content -Path $env:GITHUB_PATH -Value $wixPath

      - name: Build MSI installer
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          wix build `
            -nologo `
            -d "SourcePath=${{ env.WINX64_OUTPUT }}" `
            -d "AppName=3D AI Studio MCP Server" `
            -d "Manufacturer=3D AI Studio" `
            -d "Version=$version" `
            -d "UpgradeCode=7E3F4A2C-8B1D-4F5E-9C3A-1B2D3E4F5A6B" `
            -out "${{ env.APP_NAME }}-$version-win-x64.msi" `
            installer\Package.wxs

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-win-x64.msi

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, build-installer]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Create checksums
        shell: bash
        run: |
          find ./release-assets -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.msi" \) -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            ./release-assets/*/* \
            SHA256SUMS.txt
